<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widgets</title>
  <link rel="stylesheet" href="weather.css">
</head>

<body>
  <div class="weather-widget">
    <h2>Check City Weathers </h2>
    <div class="search-bar">
      <input type="text" placeholder="Enter city" />
      <button>🔍</button>
    </div>
    <div class="weather-info">
      <div class="weather-icon">
        <img src="https://img.icons8.com/clouds/100/000000/partly-cloudy-day.png" alt="weather-icon" />
      </div>
      <h1>29°C</h1>
      <h3>Khammam</h3>
      <div class="details">
        <div>
          <p>56%</p>
          <p>Humidity</p>
        </div>
        <div>
          <p>3.39km/h</p>
          <p>Wind Speed</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
