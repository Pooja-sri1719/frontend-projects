<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 150px;
            position: relative;
            animation: moving 3s infinite;
        }
        #div1{
            animation-timing-function: linear;
        }
        #div2{
            animation-timing-function: ease;
        }
        #div3{
            animation-timing-function: ease-in;
        }
        #div4{
            animation-timing-function: ease-out;
        }
        #div5{
            animation-timing-function: ease-in-out;
        }
        @keyframes moving{
            from{left: 0px;}
            to{
                left: 1000px;
            }
        }
    </style>
</head>
<body>
    <div id="div1"><img src="car-png-large-images-5.png" alt=""></div>
    <div id="div2"><img src="car-png-large-images-5.png" alt=""></div>
    <div id="div3"><img src="car-png-large-images-5.png" alt=""></div>
    <div id="div4"><img src="car-png-large-images-5.png" alt=""></div>
    <div id="div5"><img src="car-png-large-images-5.png" alt=""></div>
</body>
</html>
