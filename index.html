<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<style>
body{
    background-color: rgb(173, 176, 177);
    font-size: 20px;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    border: 5px;
}

    #name{
       background-color: rgb(219, 232, 232);
    }
 
    .frm{
        background-color: rgb(230, 186, 133);
        height: 100%;
        width: 15%;
        padding: 25px;
    }
    button{
        background-color: aquamarine;
        color: black;
        cursor: pointer;
        border: 10px solid red;
        border-radius: 20px;
    }
    input,
    textarea,
    button{
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        box-sizing: border-box;
        
    }
    button:hover{
        background-color: azure;
    }
    label{
        display:contents;
        margin-top: 10px;
    }
  form{
     width: 300px;
     margin: 0 auto;
     padding: 20px;
     border: 1px solid rgb(198, 166, 166);
     border-radius: 10px;
     background-color: antiquewhite;
  }
  .fgp{
    text-align: center;
    margin-top: 10px;
  }
</style>
<body>
    <img src="/pbl certificate].png" alt="varshith certificate" width="500px" height="100px">
    <center>
    <h1 style="color: rgb(111, 80, 139); font-size: 50px;">From with validation</h1>
</center>
    <form action="https://www.youtube.com/">
        <br>
        <label for="">name</label>

        <input type="text" placeholder="Enter your email" id="em">
        <br>
        <label for="">passward</label>
        <br>
        <input type="password" placeholder="Enter your passward" id="psw">
        <br>
        <label for="">phone</label>
        <input type="tel" placeholder="112-555-9999" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">

        <input type="number" placeholder="Enter your age">

        <input type="date">

        <label for="">Quantity</label>

        <input type="text">

        <label for="">website</label>
        <br>
        <input type="url" placeholder="https://example.com">
        <br>
        <label for="">submit</label>
        <br>
   
        <button type="submit">Submit</button><br>
        <button type="reset">Reset</button><br>
        <div class="fgp">
            <a href="/frg.html">forgot</a><br>
        </div>
       
    </form>
