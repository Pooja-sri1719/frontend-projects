<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        .container{
            width: 70%;
            height: 450px;
            display: flex;
            justify-content: center;
          
        }
        body{
            background-color: rgba(228, 204, 204, 0.205);
        }
        .container img{
            width: 10%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgb(8, 11, 96);
            transition: all ease-in-out 0.5s;
        }
        .container img:hover{
            width: 25%;
        }
    </style>
</head>
<body><center>
    <h1>Sai pallavi actors</h1>
    <div class="container">
        <img src="sai.jpg" alt="">
        <img src="sai-pallavi-01.jpg" alt="">
        <img src="Sai-Pallavi2.jpg" alt="">
        <img src="sai-pallavi3.jpg" alt="">
        <img src="Sai-Pallavi4.jpg" alt="">
    </div>
</center>
</body>
</html>
